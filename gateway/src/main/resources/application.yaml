spring:
  application:
    name: gateway

  # --- Redis connection (read by DataRedisAutoConfiguration) ---
  # Used by both Spring Data Redis and Spring Session. The session-specific
  # settings (namespace, max inactive interval) live on
  # @EnableRedisIndexedHttpSession in RedisConfig.java because Spring Boot 4.0
  # no longer ships Spring Session autoconfig — see that class's Javadoc.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # --- PostgreSQL for user provisioning (users table) ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:radiusdb}
    driverClassName: org.postgresql.Driver
    username: ${DB_USERNAME:v0a02tm}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      # 'update' is fine for local dev; use Flyway/Liquibase in production.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # --- OAuth2 Client Registration ---
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

server:
  port: 8080
  # --- Cookie-Based Session ---
  # The RADIUS_SESSION cookie is created after Google OAuth2 login and sent
  # on every subsequent request from the Next.js frontend (localhost:3000).
  # HttpOnly prevents JS access; SameSite=Lax allows the cookie to be sent
  # on top-level navigations while blocking cross-site POST requests.
  # The cookie value is just an opaque session ID — the actual SecurityContext
  # and OAuth2 tokens live server-side in Redis (see RedisConfig.java).
  servlet:
    session:
      timeout: 8h            # mirrored from RedisConfig's maxInactiveIntervalInSeconds
      cookie:
        name: RADIUS_SESSION
        http-only: true
        secure: ${COOKIE_SECURE:false}   # MUST be true in production (HTTPS only)
        same-site: lax
        max-age: 8h
